  <text class="tiny" x="166" y="1110">Ghi chú: GitHub ở ngoài AWS; ECR/Secrets/Cost là dịch vụ regional; Argo CD chạy trong EKS; ALB nằm trong public subnets; workload, ElastiCache và RDS nằm trong private subnets.</text>
